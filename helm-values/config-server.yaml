image:
  name: config-server
  tag: v1.0.0

component: server

service:
  port: 8888

# config-server uses /actuator/health for all probes (no readiness/liveness split)
probes:
  startup:
    path: /actuator/health
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readiness:
    path: /actuator/health
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    path: /actuator/health
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

configMapData:
  SPRING_PROFILES_ACTIVE: docker
  GIT_REPO: https://github.com/spring-petclinic/spring-petclinic-microservices-config

# config-server starts first — no init containers
initContainers: []

# Prod: 2 replicas, PDB enabled, no HPA
replicaCount: 2
autoscaling:
  enabled: false
podDisruptionBudget:
  enabled: true
  minAvailable: 1
