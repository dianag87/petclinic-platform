replicaCount: 1

image:
  name: "service-name"
  tag: "latest"
  pullPolicy: Always

component: service

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

probes:
  startup:
    path: /actuator/health
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  readiness:
    path: /actuator/health/readiness
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    path: /actuator/health/liveness
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3

configMapData: {}

env: []

secretEnv: []

initContainers: []

needsDatabase: false

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: false
  minAvailable: 1

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

global:
  imageRegistry: "820444288149.dkr.ecr.us-east-1.amazonaws.com"
  envName: "dev"
  rdsEndpoint: ""
